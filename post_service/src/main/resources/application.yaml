server:
  port: 9010
  servlet:
    context-path: /api/v1/posts

spring:
  application:
    name: post_service
  datasource:
    url: jdbc:postgresql://localhost:5432/post-db
    username: user
    password: password
#    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
