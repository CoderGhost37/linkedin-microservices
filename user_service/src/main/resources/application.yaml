service:
  port: 9020

spring:
  application:
    name: user_service
  datasource:
    url: jdbc:postgresql://localhost:5432/user-db
    username:
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
